      <span>Aya CFA<small>LEVEL I STUDY HUB</small></span></a>

<div class="wrap">
  <div class="crumb"><a href="index.html">Home</a> &rsaquo; Quizzes</div>
  <div class="page-head">
    <h1>Topic Quizzes</h1>
    <p>Short, focused quizzes with instant feedback and explanations. Pick a topic and test what you know.</p>
  </div>
  <div class="grid" id="quizGrid"></div>
</div>

<script src="assets/js/app.js"></script>
<script src="assets/js/topics.js"></script>
<script src="assets/js/quizzes.js"></script>
<script>
(function(){
  var grid=document.getElementById('quizGrid');
  TOPICS.forEach(function(t){
    var qz=QUIZZES[t.id];
    if(!qz) return;
    var c=document.createElement('div');c.className='card';
    c.innerHTML='<span class="num">'+t.num+'</span>'+
      '<h3>'+t.name+'</h3>'+
      '<p>'+qz.questions.length+' questions · instant feedback &amp; explanations.</p>'+
      '<div class="links"><a class="pill" href="quiz.html?t='+t.id+'">Start quiz &rarr;</a></div>';
    grid.appendChild(c);
  });
})();
</script>
</body>
