  <div class="page-head">

<script src="assets/js/app.js"></script>
<script src="assets/js/quizzes.js"></script>
<script>
(function(){
  var params=new URLSearchParams(location.search);
  var id=params.get('t');
  var qz=QUIZZES[id];
  if(!qz){
    document.getElementById('quizApp').innerHTML=
      '<p>Quiz not found. <a href="quizzes.html">Back to all quizzes</a>.</p>';
    return;
  }
  document.getElementById('quizTitle').textContent=qz.title+' — Quiz';
  document.getElementById('crumbTopic').textContent=qz.title;
  document.title=qz.title+' Quiz — Aya CFA';
  startQuiz(qz);
})();
</script>
